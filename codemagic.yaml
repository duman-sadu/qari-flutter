workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    environment:
      groups:
        - ios
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: kz.dudi.qari
      vars:
        BUNDLE_ID: kz.dudi.qari
    scripts:
      - name: Decode GoogleService-Info.plist
        script: |
          echo $GOOGLE_SERVICE_INFO_PLIST | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install

      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        script: |
          echo "$APP_STORE_CONNECT_PUBLISHER_PRIVATE_KEY" | base64 --decode > /tmp/auth_key.p8
          app-store-connect publish \
            --path "$(find build/ios/ipa -name '*.ipa')" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/auth_key.p8 \
            --testflight

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
