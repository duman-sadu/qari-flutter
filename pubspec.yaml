name: qari_flutter
description: "Qari — Quran memorization and reading app with daily reminders and AI assistant."
publish_to: 'none'

version: 1.0.0+13

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.2.0
  audioplayers: ^5.2.1
  audio_service: ^0.18.13
  speech_to_text: ^7.3.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  cupertino_icons: ^1.0.8

  # Google Login + Firebase
  firebase_core: ^3.15.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.6.0

  url_launcher: ^6.3.0
  in_app_purchase: ^3.2.0

  # Friends / QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/hadi/
    - assets/intro/
    - assets/quran_data.json
